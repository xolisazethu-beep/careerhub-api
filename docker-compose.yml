services:
  db:
    image: postgres:17
    container_name: careerhub-postgres
    restart: unless-stopped
    environment:
      # Values come from the .env file (see .env.example). These MUST match
      # ConnectionStrings:DefaultConnection in appsettings.*.json.
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - copy .env.example to .env}
      POSTGRES_DB: ${POSTGRES_DB:-CareerHub}
    ports:
      - "5432:5432"
    volumes:
      - careerhub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-CareerHub}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  careerhub_pgdata:
